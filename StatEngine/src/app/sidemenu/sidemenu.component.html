<div>
    <mat-sidenav-container>
      <mat-sidenav mode="side" opened>
        <ng-container *ngFor="let page of pages">
          <mat-list-item class="menubox" (click)="navigateTo(page.link)">
            <mat-icon>{{ page.icon }}</mat-icon>
            <span>{{ page.name }}</span>
            console.log("{{page.name}} created")
          </mat-list-item>
        </ng-container>
        <mat-divider></mat-divider>
      </mat-sidenav>
    </mat-sidenav-container>
  </div>
